version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - contextcheck
    - cyclop
    - dupl
    - exhaustive
    - gocognit
    - gocritic
    - godot
    - err113
    - gosec
    - misspell
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - unconvert
    - unparam
    - wrapcheck

  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
    gosec:
      excludes:
        - G115
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - err113
          - wrapcheck
          - gosec
          - dupl
          - gocognit
          - cyclop
      - path: "internal/gen/"
        linters:
          - all

formatters:
  enable:
    - gofumpt

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
