version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - contextcheck
    - cyclop
    - dupl
    - exhaustive
    - gocognit
    - gocritic
    - godot
    - err113
    - gosec
    - misspell
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - unconvert
    - unparam
    - wrapcheck

  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - rangeValCopy
        - hugeParam
    revive:
      rules:
        - name: exported
          disabled: true
    wrapcheck:
      ignore-package-globs:
        - github.com/jackc/pgx/v5
        - github.com/jackc/pgx/v5/*
        - crypto/rand

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - err113
          - wrapcheck
          - gosec
          - dupl
          - gocognit
          - cyclop
      - path: "internal/gen/"
        linters:
          - all
      # G124: the session cookie's Secure attribute is intentionally configurable
      # via COOKIE_SECURE (false for local http dev). Scoped to the only file that
      # sets cookies so G124 stays active everywhere else.
      - path: "internal/auth/cookie\\.go"
        linters:
          - gosec
      # G704 (SSRF via taint analysis): the healthcheck binary builds its
      # request URL from the PORT env var, which gosec's taint tracker flags
      # regardless of validation. PORT is trusted deployment config (set by
      # the Dockerfile/compose/Helm chart, never attacker input), the host is
      # a hardcoded loopback literal, and parsePort() already validates the
      # value is a real port number — this is not an actual SSRF sink. Scoped
      # to this one file so G704 stays active everywhere else.
      - path: "cmd/healthcheck/main\\.go"
        linters:
          - gosec
      - path: "internal/server/server\\.go"
        linters:
          - wrapcheck
          - dupl
      - path: "internal/finances/handler\\.go"
        linters:
          - dupl
      # MemberStats and EventStats are independent aggregation queries against
      # different tables with different scan signatures; the query-loop-scan
      # shape they share is inherent to database/sql, not copy-paste, and
      # became "dupl"-similar only because both now select their subject's
      # `type`/`avatar_color`-equivalent column.
      - path: "internal/stats/repository\\.go"
        linters:
          - dupl

formatters:
  enable:
    - gofumpt

issues:
  max-issues-per-linter: 200
  max-same-issues: 50
