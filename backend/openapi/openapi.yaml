                $ref: "#/components/schemas/Contribution"

  # ── Stats ───────────────────────────────────────────────────────────────────

  /teams/{teamId}/stats:
    parameters:
      - $ref: "#/components/parameters/teamId"
    get:
      tags: [stats]
      operationId: getStatsOverview
      x-rbac-module: events
      summary: Team attendance statistics
      parameters:
        - name: from
          in: query
