            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /teams/{teamId}/stats/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [stats]
      operationId: getMemberStats
      x-rbac-module: events
      summary: Individual member attendance statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberAttendanceStats"

# ─── Components ───────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    teamId:
      name: teamId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    membershipId:
      name: membershipId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    eventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    roleId:
      name: roleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    cursor:
      name: cursor
      in: query
      description: Opaque keyset-pagination cursor returned as nextCursor by a prior page.
      schema:
        type: string

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    TooManyRequests:
      description: >-
        Too Many Requests. Every endpoint is subject to the global per-IP
        rate limit (RATE_LIMIT_RPS); /auth/login additionally enforces a
        stricter per-IP limit (LOGIN_RATE_LIMIT_PER_MIN) for brute-force
        protection.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    PayloadTooLarge:
      description: >-
        Payload Too Large. All request bodies are capped at 4 MB by default;
        image upload endpoints additionally enforce their own lower limit.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    PhotoRedirect:
      description: >-
        Redirect to a short-lived presigned URL for the image, hosted by the
        object store rather than this API. Access is membership-gated before
        the URL is issued; the URL itself carries no further authorization.
      headers:
        Location:
          schema:
            type: string
            format: uri
          description: Presigned URL to fetch the image bytes from.

  schemas:

    # ── Primitives / Enums ────────────────────────────────────────────────────

    Problem:
      type: object
      description: RFC 9457 Problem Details
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string

    PermLevel:
      type: string
      enum: [none, read, write]

    Permissions:
      type: object
      description: Per-module permission levels
      required: [events, members, finances, news, polls, settings]
      properties:
        events:
          $ref: "#/components/schemas/PermLevel"
        members:
          $ref: "#/components/schemas/PermLevel"
        finances:
          $ref: "#/components/schemas/PermLevel"
        news:
          $ref: "#/components/schemas/PermLevel"
        polls:
          $ref: "#/components/schemas/PermLevel"
        settings:
          $ref: "#/components/schemas/PermLevel"

    EventType:
      type: string
      enum: [training, auftritt, event]

    EventStatus:
      type: string
      enum: [active, cancelled]

    AttendanceStatus:
      type: string
      enum: [yes, no, maybe, pending, not_nominated]

    ResponseMode:
      type: string
      enum: [opt_in, opt_out]

    TransactionType:
      type: string
      enum: [income, expense]

    ContributionStatus:
      type: string
      enum: [paid, open]

    NotificationType:
      type: string
      enum:
        - attendance
        - event_created
        - event_updated
        - event_cancelled
        - event_reactivated
        - event_deleted
        - news
        - poll
        - absence

    # ── Auth ─────────────────────────────────────────────────────────────────

    Provider:
      type: object
      required: [id, name, sub, glyph, bg, fg]
      properties:
        id:
          type: string
        name:
          type: string
        sub:
          type: string
        glyph:
          type: string
        bg:
          type: string
        fg:
          type: string
        border:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    DeleteAccountRequest:
      type: object
      required: [confirmEmail]
      properties:
        confirmEmail:
          type: string
          format: email
          description: >
            The account's own email address, retyped to confirm the
            irreversible erasure. Must match the authenticated user's email.

    User:
      type: object
      required: [id, name, email, avatarColor]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        avatarColor:
          type: string
        birthday:
          type: string
          format: date
        address:
          type: string
        hasPhoto:
          type: boolean

    # ── Teams ────────────────────────────────────────────────────────────────

    Team:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        short:
          type: string
        icon:
          type: string
        iconBg:
          type: string
        iconFg:
          type: string
        description:
          type: string
        hasPhoto:
          type: boolean
        hasLogo:
          type: boolean
        reasonVisibilityRoleIds:
          type: array
          items:
            type: string
            format: uuid

    TeamForUser:
      allOf:
        - $ref: "#/components/schemas/Team"
        - type: object
          required: [myRoles, myPerms, membershipId, memberCount]
          properties:
            myRoles:
              type: array
              items:
                $ref: "#/components/schemas/Role"
            myPerms:
              $ref: "#/components/schemas/Permissions"
            membershipId:
              type: string
              format: uuid
            memberCount:
              type: integer

    AcceptInviteResponse:
      allOf:
        - $ref: "#/components/schemas/TeamForUser"
        - type: object
          required: [alreadyMember]
          properties:
            alreadyMember:
              type: boolean
              description: >-
                True when the caller was already a member of this team before
                redeeming the code (the request was a no-op join-wise).

    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        icon:
          type: string
        iconBg:
          type: string
        iconFg:
          type: string

    UpdateTeamRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        short:
          type: string
          maxLength: 50
        icon:
          type: string
        iconBg:
          type: string
        iconFg:
          type: string
        description:
          type: string
          maxLength: 10000
        reasonVisibilityRoleIds:
          type: array
          items:
            type: string
            format: uuid

    Invite:
      type: object
      required: [id, teamId, code, link, createdAt, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        code:
          type: string
        link:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    # ── Members & Roles ──────────────────────────────────────────────────────

    Role:
      type: object
      required: [id, teamId, name, system, permissions]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        name:
          type: string
        system:
          type: boolean
        color:
          type: string
        permissions:
          $ref: "#/components/schemas/Permissions"

    CreateRoleRequest:
      type: object
      required: [name, permissions]
      properties:
        name:
          type: string
        color:
          type: string
          maxLength: 32
        permissions:
          $ref: "#/components/schemas/Permissions"

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
          maxLength: 32
        permissions:
          $ref: "#/components/schemas/Permissions"

    Member:
      type: object
      required: [membershipId, userId, name, email, avatarColor, roles, joinedAt]
      properties:
        membershipId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        birthday:
          type: string
          format: date
        address:
          type: string
        avatarColor:
          type: string
        hasPhoto:
          type: boolean
        group:
          type: string
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
        primaryRole:
          $ref: "#/components/schemas/Role"
        perms:
          $ref: "#/components/schemas/Permissions"
        joinedAt:
          type: string
          format: date-time

    UpdateMemberRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        birthday:
          type: string
          format: date
        address:
          type: string
        roleIds:
          type: array
          items:
            type: string
            format: uuid
        group:
          type: string

    SetRolesRequest:
      type: object
      required: [roleIds]
      properties:
        roleIds:
          type: array
          items:
            type: string
            format: uuid

    # ── Events ───────────────────────────────────────────────────────────────

    EventSummary:
      type: object
      required: [yes, no, maybe, pending, notNominated, nominated, total]
      properties:
        yes:
          type: integer
        no:
          type: integer
        maybe:
          type: integer
        pending:
          type: integer
        notNominated:
          type: integer
        nominated:
          type: integer
        total:
          type: integer

    TeamEvent:
      type: object
      required: [id, teamId, type, title, date, status, recurring, summary]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        seriesId:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/EventType"
        title:
          type: string
        date:
          type: string
          format: date
        location:
          type: string
        note:
          type: string
        result:
          type: string
        meetTime:
          type: string
          description: "HH:mm"
        startTime:
          type: string
          description: "HH:mm"
        endTime:
          type: string
          description: "HH:mm"
        meetTimeMandatory:
          type: boolean
        responseMode:
          $ref: "#/components/schemas/ResponseMode"
        nominatedRoleIds:
          type: array
          items:
            type: string
            format: uuid
        recurring:
          type: boolean
        status:
          $ref: "#/components/schemas/EventStatus"
        summary:
          $ref: "#/components/schemas/EventSummary"
        myStatus:
          $ref: "#/components/schemas/AttendanceStatus"
        myAuto:
          type: boolean
        myReason:
          type: string

    CreateEventRequest:
      type: object
      required: [type, title, date]
      properties:
        type:
          $ref: "#/components/schemas/EventType"
        title:
          type: string
          minLength: 1
          maxLength: 255
        date:
          type: string
          format: date
        location:
          type: string
          maxLength: 255
        note:
          type: string
          maxLength: 10000
        meetTime:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        meetTimeMandatory:
          type: boolean
        responseMode:
          $ref: "#/components/schemas/ResponseMode"
        nominatedRoleIds:
          type: array
          items:
            type: string
            format: uuid
        recurring:
          type: boolean
        repeatWeeks:
          type: integer
          minimum: 1
          maximum: 104

    UpdateEventRequest:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/EventType"
        title:
          type: string
          minLength: 1
          maxLength: 255
        date:
          type: string
          format: date
        location:
          type: string
          maxLength: 255
        note:
          type: string
          maxLength: 10000
        meetTime:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        meetTimeMandatory:
          type: boolean
        responseMode:
          $ref: "#/components/schemas/ResponseMode"
        nominatedRoleIds:
          type: array
          items:
            type: string
            format: uuid

    SetEventStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/EventStatus"

    EventComment:
      type: object
      required: [id, eventId, userId, text, createdAt]
      properties:
        id:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        text:
          type: string
        createdAt:
          type: string
          format: date-time
        authorName:
          type: string
        authorColor:
          type: string
        hasAuthorPhoto:
          type: boolean

    AddCommentRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1

    # ── Attendance ───────────────────────────────────────────────────────────

    AttendanceRecord:
      type: object
      required: [id, eventId, userId, status]
      properties:
        id:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/AttendanceStatus"
        reason:
          type: string
        reasonId:
          type: string
        reasonVisibility:
          type: string
          enum: [trainers, team]
        at:
          type: string
          format: date-time

    AttendanceRow:
      type: object
      required: [userId, name, avatarColor, status]
      properties:
        userId:
          type: string
          format: uuid
        name:
          type: string
        avatarColor:
          type: string
        hasPhoto:
          type: boolean
        group:
          type: string
        primaryRole:
          $ref: "#/components/schemas/Role"
        status:
          $ref: "#/components/schemas/AttendanceStatus"
        reason:
          type: string
        reasonId:
          type: string
        reasonVisibility:
          type: string
          enum: [trainers, team]
        auto:
          type: boolean
        absent:
          type: boolean

    SetAttendanceRequest:
      type: object
      required: [userId, status]
      properties:
        userId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/AttendanceStatus"
        reason:
          type: string
          maxLength: 500
        reasonId:
          type: string
        reasonVisibility:
          type: string
          enum: [trainers, team]

    SetNominationRequest:
      type: object
      required: [userId, nominated]
      properties:
        userId:
          type: string
          format: uuid
        nominated:
          type: boolean

    # ── Absences ─────────────────────────────────────────────────────────────

    Absence:
      type: object
      required: [id, userId, from, to, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        reason:
          type: string
        createdAt:
          type: string
          format: date-time
        memberName:
          type: string
        memberAvatarColor:
          type: string
        hasPhoto:
          type: boolean
        roleColor:
          type: string
        roleName:
          type: string

    CreateAbsenceRequest:
      type: object
      required: [userId, from, to]
      properties:
        userId:
          type: string
          format: uuid
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        reason:
          type: string

    UpdateAbsenceRequest:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        reason:
          type: string

    # ── News ─────────────────────────────────────────────────────────────────

    NewsItem:
      type: object
      required: [id, teamId, authorId, title, body, pinned, createdAt]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        pinned:
          type: boolean
        createdAt:
          type: string
          format: date-time
        authorName:
          type: string
        authorColor:
          type: string
        hasAuthorPhoto:
          type: boolean

    CreateNewsRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        body:
          type: string
          minLength: 1
          maxLength: 10000
        pinned:
          type: boolean
          default: false

    UpdateNewsRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        body:
          type: string
          minLength: 1
          maxLength: 10000
        pinned:
          type: boolean

    # ── Polls ────────────────────────────────────────────────────────────────

    PollOption:
      type: object
      required: [id, text, count, pct]
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        count:
          type: integer
        pct:
          type: number
          format: float
        voters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              color:
                type: string
              hasPhoto:
                type: boolean

    Poll:
      type: object
      required: [id, question, multiple, anonymous, createdAt, totalVotes, options]
      properties:
        id:
          type: string
          format: uuid
        question:
          type: string
        multiple:
          type: boolean
        anonymous:
          type: boolean
        createdAt:
          type: string
          format: date-time
        totalVotes:
          type: integer
        myVote:
          type: array
          items:
            type: string
            format: uuid
        options:
          type: array
          items:
            $ref: "#/components/schemas/PollOption"

    CreatePollRequest:
      type: object
      required: [question, options]
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
          minItems: 2
          maxItems: 4
        multiple:
          type: boolean
          default: false
        anonymous:
          type: boolean
          default: false

    VotePollRequest:
      type: object
      required: [optionIds]
      properties:
        optionIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 0
          maxItems: 4
          description: >-
            Empty array clears the caller's vote. Voting UIs let a user
            un-select their last remaining choice on a multi-select poll,
            which submits an empty array to retract the vote entirely.
            Capped to match CreatePollRequest.options' maxItems, since a
            poll can never have more options than that to vote for.

    # ── Notifications ────────────────────────────────────────────────────────

    AppNotification:
      type: object
      required: [id, teamId, type, createdAt]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/NotificationType"
        actorId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/AttendanceStatus"
        title:
          type: string
        eventId:
          type: string
          format: uuid
        eventTitle:
          type: string
        eventDate:
          type: string
          format: date
        note:
          type: string
        createdAt:
          type: string
          format: date-time
        actorName:
          type: string
        actorColor:
          type: string
        hasActorPhoto:
          type: boolean
        unread:
          type: boolean

    NotificationsResult:
      type: object
      required: [items, unreadCount]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AppNotification"
        unreadCount:
          type: integer

    # ── Finances ─────────────────────────────────────────────────────────────

    Transaction:
      type: object
      required: [id, teamId, type, title, amount, date]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/TransactionType"
        title:
          type: string
        amount:
          type: integer
          format: int64
          description: Amount in cents (e.g. 1050 = 10.50)
        date:
          type: string
          format: date
        category:
          type: string

    CreateTransactionRequest:
      type: object
      required: [type, title, amount]
      properties:
        type:
          $ref: "#/components/schemas/TransactionType"
        title:
          type: string
          maxLength: 255
        amount:
          type: integer
          format: int64
          description: Amount in cents (e.g. 1050 = 10.50)
          minimum: 1
          maximum: 100000000
        category:
          type: string
          maxLength: 255
        date:
          type: string
          format: date
          description: >-
            Transaction date (e.g. to back-date a receipt). Defaults to the
            server's current date when omitted.

    UpdateTransactionRequest:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/TransactionType"
        title:
          type: string
          maxLength: 255
        amount:
          type: integer
          format: int64
          description: Amount in cents (e.g. 1050 = 10.50)
          minimum: 1
          maximum: 100000000
        category:
          type: string
          maxLength: 255
        date:
          type: string
          format: date
          description: Transaction date.

    Penalty:
      type: object
      required: [id, teamId, label, amount]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        label:
          type: string
        amount:
          type: integer
          format: int64
          description: Amount in cents (e.g. 1050 = 10.50)

    CreatePenaltyRequest:
      type: object
      required: [label, amount]
      properties:
        label:
          type: string
        amount:
          type: integer
          format: int64
          description: Amount in cents (e.g. 1050 = 10.50)
          minimum: 1
          maximum: 100000000

    UpdatePenaltyRequest:
      type: object
      properties:
        label:
          type: string
        amount:
          type: integer
          format: int64
          description: Amount in cents (e.g. 1050 = 10.50)
          minimum: 1
          maximum: 100000000

    PenaltyAssignment:
      type: object
      required: [id, teamId, userId, paid, date]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        penaltyId:
          type: string
          format: uuid
          nullable: true
          description: >-
            The catalog penalty this assignment was created from, or null if
            that penalty has since been deleted. The assignment's own label and
            amount snapshot (taken at creation) remain the authoritative record.
        paid:
          type: boolean
        date:
          type: string
          format: date
        memberName:
          type: string
        memberAvatarColor:
          type: string
        hasPhoto:
          type: boolean
        label:
          type: string
        amount:
          type: integer
          format: int64
          description: Amount in cents (e.g. 1050 = 10.50)

    CreatePenaltyAssignmentRequest:
      type: object
      required: [userId, penaltyId]
      properties:
        userId:
          type: string
          format: uuid
        penaltyId:
          type: string
          format: uuid

    SetPaidRequest:
      type: object
      required: [paid]
      properties:
        paid:
          type: boolean
          description: >-
            The desired paid state. Idempotent — sending the same value twice
            yields the same result, so a retried request never flips the state
            back (unlike the previous toggle endpoints).

    OpenPenalty:
      type: object
      required: [userId, name, avatarColor, amount]
      properties:
        userId:
          type: string
          format: uuid
        name:
          type: string
        avatarColor:
          type: string
        hasPhoto:
          type: boolean
        amount:
          type: integer
          format: int64
          description: Amount in cents (e.g. 1050 = 10.50)

    Contribution:
      type: object
      required: [id, teamId, userId, month, amount, status]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        month:
          type: string
          description: "YYYY-MM"
        label:
          type: string
        amount:
          type: integer
          format: int64
          description: Amount in cents (e.g. 1050 = 10.50)
        status:
          $ref: "#/components/schemas/ContributionStatus"
        memberName:
          type: string
        memberAvatarColor:
          type: string
        hasPhoto:
          type: boolean

    UpdateContributionRequest:
      type: object
      properties:
        label:
          type: string
        amount:
          type: integer
          format: int64
          description: Amount in cents (e.g. 1050 = 10.50)
          minimum: 1
          maximum: 100000000

    FinanceOverview:
      type: object
      required: [balance, income, expense, transactions, penalties, assignments, openPenalties, openPenaltySum, contributions, contribOpen]
      properties:
        balance:
          type: integer
          format: int64
          description: Balance in cents (income minus expense)
        income:
          type: integer
          format: int64
          description: Total income in cents
        expense:
          type: integer
          format: int64
          description: Total expense in cents
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        penalties:
          type: array
          items:
            $ref: "#/components/schemas/Penalty"
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/PenaltyAssignment"
        openPenalties:
          type: array
          items:
            $ref: "#/components/schemas/OpenPenalty"
        openPenaltySum:
          type: integer
          format: int64
          description: Sum of all open (unpaid) penalties across all members, in cents
        contributions:
          type: array
          items:
            $ref: "#/components/schemas/Contribution"
        contribOpen:
          type: integer

    # ── Stats ────────────────────────────────────────────────────────────────

    MemberAttendanceStats:
      type: object
      required: [quote, counted, yes]
      properties:
        quote:
          type: number
          format: float
        counted:
          type: integer
        yes:
          type: integer

    MemberStat:
      type: object
      required: [userId, name, avatarColor, quote, counted, yes]
      properties:
        userId:
          type: string
          format: uuid
        name:
          type: string
        avatarColor:
          type: string
        hasPhoto:
          type: boolean
        quote:
          type: number
          format: float
        counted:
          type: integer
        yes:
          type: integer

    EventStat:
      type: object
      required: [id, title, type, date, yes, nominated, pct, enough]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        type:
          $ref: "#/components/schemas/EventType"
        date:
          type: string
          format: date
        yes:
          type: integer
        nominated:
          type: integer
        pct:
          type: number
          format: float
        enough:
          type: boolean

    StatsOverview:
      type: object
      required: [avg, members, events, pastCount, from, to]
      properties:
        avg:
          type: number
          format: float
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberStat"
        events:
          type: array
          items:
            $ref: "#/components/schemas/EventStat"
        pastCount:
          type: integer
        from:
          type: string
          format: date
        to:
          type: string
          format: date
