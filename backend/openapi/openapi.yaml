openapi: "3.0.3"

info:
  title: Team Manager API
  description: >-
    REST API for the Teamverwaltung sports-club management application.


    Every endpoint may return `429 Too Many Requests` (global per-IP rate
    limit, `RATE_LIMIT_RPS`) or `413 Payload Too Large` (request body cap,
    4 MB by default) — see the `TooManyRequests`/`PayloadTooLarge` reusable
    responses. These aren't repeated on every operation below to keep the
    spec readable; `/auth/login` documents its own stricter rate limit
    explicitly since it differs from the global default.
  version: "1.0.0"
  contact:
    name: Team Manager
    url: https://github.com/yoadey/team-manager

servers:
  - url: /api/v1
    description: Current server

security:
  - bearerAuth: []

# ─── Tags ────────────────────────────────────────────────────────────────────
tags:
  - name: auth
  - name: teams
  - name: members
  - name: roles
  - name: events
  - name: attendance
  - name: absences
  - name: news
  - name: polls
  - name: notifications
  - name: finances
  - name: stats

# ─── Paths ───────────────────────────────────────────────────────────────────
paths:

  # ── Auth ────────────────────────────────────────────────────────────────────

  /auth/providers:
    get:
      tags: [auth]
      operationId: listProviders
      summary: List available login providers
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Provider"

  /auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Authenticate with email + password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: Invalidate current session
      responses:
        "204":
          description: No Content

  /auth/me:
    get:
      tags: [auth]
      operationId: getCurrentUser
      summary: Get authenticated user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [auth]
      operationId: deleteCurrentUser
      summary: Erase the authenticated account (GDPR Art. 17, by anonymization)
      description: >
        Anonymizes the user's personal data (name, email, phone, birthday,
        address, photo) and strips free-text PII from their comments and
        absence reasons, then deletes all of their sessions. Membership,
        attendance and finance records are retained in anonymized form so that
        shared and legally required data (e.g. accounting) stays intact. The
        request is authorized by the active session; to confirm intent the
        caller must echo the account's own email address (works regardless of
        login method, including OIDC accounts that have no password).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountRequest"
      responses:
        "204":
          description: Account anonymized; session cleared
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/data-export:
    get:
      tags: [auth]
      operationId: getMyDataExport
      summary: Export the authenticated user's personal data (GDPR Art. 15)
      description: >
        Returns a single JSON document with all personal data held about the
        authenticated user: profile, memberships and roles, attendance,
        comments, absences, authored news, created polls, votes, penalty
        assignments and contributions.
      responses:
        "200":
          description: Personal-data export document.
          headers:
            Content-Disposition:
              schema:
                type: string
              description: Suggests a download filename.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/photo:
    get:
      tags: [auth]
      operationId: getMyPhoto
      summary: Get user profile photo
      responses:
        "302":
          $ref: "#/components/responses/PhotoRedirect"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [auth]
      operationId: uploadMyPhoto
      summary: Upload / replace profile photo (scaled to max 800×800 px)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"

  # ── Teams ───────────────────────────────────────────────────────────────────

  /teams:
    get:
      tags: [teams]
      operationId: listTeams
      summary: List teams the authenticated user belongs to
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamForUser"
    post:
      tags: [teams]
      operationId: createTeam
      summary: Create a new team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamForUser"

  /teams/{teamId}:
    parameters:
      - $ref: "#/components/parameters/teamId"
    get:
      tags: [teams]
      operationId: getTeam
      x-rbac-module: public
      summary: Get a single team
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [teams]
      operationId: updateTeam
      x-rbac-module: settings
      summary: Update team settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{teamId}/photo:
    parameters:
      - $ref: "#/components/parameters/teamId"
    get:
      tags: [teams]
      operationId: getTeamPhoto
      x-rbac-module: public
      summary: Get team photo
      responses:
        "302":
          $ref: "#/components/responses/PhotoRedirect"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [teams]
      operationId: uploadTeamPhoto
      x-rbac-module: settings
      summary: Upload team photo (scaled to max 800×800 px)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
    delete:
      tags: [teams]
      operationId: deleteTeamPhoto
      x-rbac-module: settings
      summary: Remove team photo (revert to icon)
      responses:
        "204":
          description: No Content

  /teams/{teamId}/logo:
    parameters:
      - $ref: "#/components/parameters/teamId"
    get:
      tags: [teams]
      operationId: getTeamLogo
      x-rbac-module: public
      summary: Get team logo
      responses:
        "302":
          $ref: "#/components/responses/PhotoRedirect"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [teams]
      operationId: uploadTeamLogo
      x-rbac-module: settings
      summary: Upload team logo (scaled to max 800×800 px)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [logo]
              properties:
                logo:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
    delete:
      tags: [teams]
      operationId: deleteTeamLogo
      x-rbac-module: settings
      summary: Remove team logo (revert to icon)
      responses:
        "204":
          description: No Content

  /teams/{teamId}/invite:
    parameters:
      - $ref: "#/components/parameters/teamId"
    post:
      tags: [teams]
      operationId: createInvite
      x-rbac-module: settings
      summary: Generate a 7-day invite link
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"

  /invites/{code}/accept:
    parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [teams]
      operationId: acceptInvite
      summary: Redeem an invite code, adding the authenticated user to its team
      description: >-
        Idempotent: redeeming a code for a team the caller already belongs to
        just returns that team rather than erroring.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Members ─────────────────────────────────────────────────────────────────

  /teams/{teamId}/members:
    parameters:
      - $ref: "#/components/parameters/teamId"
    get:
      tags: [members]
      operationId: listMembers
      x-rbac-module: members
      summary: List team members
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"
                  nextCursor:
                    type: string
                    nullable: true
                    description: Cursor for the next page, or null when there are no more items.

  /teams/{teamId}/members/{membershipId}:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - $ref: "#/components/parameters/membershipId"
    patch:
      tags: [members]
      operationId: updateMember
      x-rbac-module: members
      summary: Update member profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
    delete:
      tags: [members]
      operationId: removeMember
      x-rbac-module: members
      summary: Remove member from team
      responses:
        "204":
          description: No Content

  /teams/{teamId}/members/{membershipId}/photo:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - $ref: "#/components/parameters/membershipId"
    get:
      tags: [members]
      operationId: getMemberPhoto
      x-rbac-module: members
      summary: Get a team member's profile photo
      responses:
        "302":
          $ref: "#/components/responses/PhotoRedirect"
        "404":
          $ref: "#/components/responses/NotFound"

  /teams/{teamId}/members/{membershipId}/roles:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - $ref: "#/components/parameters/membershipId"
    put:
      tags: [members]
      operationId: setMemberRoles
      x-rbac-module: settings
      summary: Replace member role assignments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRolesRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  # ── Roles ───────────────────────────────────────────────────────────────────

  /teams/{teamId}/roles:
    parameters:
      - $ref: "#/components/parameters/teamId"
    get:
      tags: [roles]
      operationId: listRoles
      x-rbac-module: settings
      summary: List team roles
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      tags: [roles]
      operationId: createRole
      x-rbac-module: settings
      summary: Create a custom role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /teams/{teamId}/roles/{roleId}:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - $ref: "#/components/parameters/roleId"
    patch:
      tags: [roles]
      operationId: updateRole
      x-rbac-module: settings
      summary: Update role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
    delete:
      tags: [roles]
      operationId: deleteRole
      x-rbac-module: settings
      summary: Delete role
      responses:
        "204":
          description: No Content

  # ── Events ──────────────────────────────────────────────────────────────────

  /teams/{teamId}/events:
    parameters:
      - $ref: "#/components/parameters/teamId"
    get:
      tags: [events]
      operationId: listEvents
      x-rbac-module: events
      summary: List events
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [upcoming, past, all]
            default: upcoming
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamEvent"
                  nextCursor:
                    type: string
                    nullable: true
                    description: Cursor for the next page, or null when there are no more items.
    post:
      tags: [events]
      operationId: createEvent
      x-rbac-module: events
      summary: Create event (recurring → creates series + instances)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEvent"

  /teams/{teamId}/events/{eventId}:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - $ref: "#/components/parameters/eventId"
    get:
      tags: [events]
      operationId: getEvent
      x-rbac-module: events
      summary: Get single event with attendance summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEvent"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [events]
      operationId: updateEvent
      x-rbac-module: events
      summary: Update event
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [single, series]
            default: single
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEvent"
    delete:
      tags: [events]
      operationId: deleteEvent
      x-rbac-module: events
      summary: Delete event
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [single, series]
            default: single
      responses:
        "204":
          description: No Content

  /teams/{teamId}/events/{eventId}/status:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - $ref: "#/components/parameters/eventId"
    post:
      tags: [events]
      operationId: setEventStatus
      x-rbac-module: events
      summary: Activate or cancel event
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [single, series]
            default: single
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetEventStatusRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEvent"

  /teams/{teamId}/events/{eventId}/comments:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - $ref: "#/components/parameters/eventId"
    get:
      tags: [events]
      operationId: listEventComments
      x-rbac-module: events
      summary: List comments for event (keyset-paginated, oldest-first)
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/EventComment"
                  nextCursor:
                    type: string
                    nullable: true
                    description: Cursor for the next page, or null when there are no more items.
    post:
      tags: [events]
      operationId: addEventComment
      x-rbac-module: events
      x-rbac-self-service: true
      summary: Add comment to event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventComment"

  /teams/{teamId}/events/{eventId}/comments/{commentId}:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - $ref: "#/components/parameters/eventId"
      - name: commentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [events]
      operationId: deleteEventComment
      x-rbac-module: events
      x-rbac-self-service: true
      summary: Delete comment
      responses:
        "204":
          description: No Content

  # ── Attendance ──────────────────────────────────────────────────────────────

  /teams/{teamId}/events/{eventId}/attendance:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - $ref: "#/components/parameters/eventId"
    get:
      tags: [attendance]
      operationId: listAttendance
      x-rbac-module: events
      summary: Get attendance matrix for event
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRow"
    post:
      tags: [attendance]
      operationId: setAttendance
      x-rbac-module: events
      x-rbac-self-service: true
      summary: Set attendance status for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAttendanceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /teams/{teamId}/events/{eventId}/attendance/nominations:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - $ref: "#/components/parameters/eventId"
    put:
      tags: [attendance]
      operationId: setNomination
      x-rbac-module: events
      summary: Nominate or denominate a member for event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetNominationRequest"
      responses:
        "204":
          description: No Content

  # ── Absences ────────────────────────────────────────────────────────────────

  /teams/{teamId}/absences:
    parameters:
      - $ref: "#/components/parameters/teamId"
    get:
      tags: [absences]
      operationId: listAbsences
      x-rbac-module: public
      summary: List absences for the team
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Absence"
                  nextCursor:
                    type: string
                    nullable: true
                    description: Cursor for the next page, or null when there are no more items.
    post:
      tags: [absences]
      operationId: createAbsence
      x-rbac-module: public
      summary: Create absence entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAbsenceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Absence"

  /teams/{teamId}/absences/mine:
    parameters:
      - $ref: "#/components/parameters/teamId"
    get:
      tags: [absences]
      operationId: listMyAbsences
      x-rbac-module: public
      summary: List authenticated user's own absences
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Absence"
                  nextCursor:
                    type: string
                    nullable: true
                    description: Cursor for the next page, or null when there are no more items.

  /teams/{teamId}/absences/{absenceId}:
    parameters:
      - $ref: "#/components/parameters/teamId"
      - name: absenceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [absences]
      operationId: updateAbsence
      x-rbac-module: public
      summary: Update absence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAbsenceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Absence"
    delete:
      tags: [absences]
      operationId: deleteAbsence
      x-rbac-module: public
      summary: Delete absence
      responses:
        "204":
          description: No Content

  # ── News ────────────────────────────────────────────────────────────────────

  /teams/{teamId}/news:
    parameters:
      - $ref: "#/components/parameters/teamId"
    get:
      tags: [news]
      operationId: listNews
      x-rbac-module: news
      summary: List team news
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NewsItem"
                  nextCursor:
                    type: string
                    nullable: true
                    description: Cursor for the next page, or null when there are no more items.
    post:
      tags: [news]
      operationId: createNews
      x-rbac-module: news
      summary: Create news item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
