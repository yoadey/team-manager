# Staging overrides — lower resource footprint, debug logging enabled.
replicaCount: 1

image:
  tag: "main"  # track main branch image for staging

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
  hosts:
    - host: staging.team-manager.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: team-manager-staging-tls
      hosts:
        - staging.team-manager.example.com

allowedOrigins: "https://staging.team-manager.example.com"

existingSecret: "team-manager-staging-secrets"

env:
  PORT: "8080"
  COOKIE_SECURE: "true"
  SESSION_TTL_HOURS: "720"
  OTEL_SERVICE_NAME: "team-manager-backend-staging"
  ENVIRONMENT: "staging"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false
