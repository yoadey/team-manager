apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "team-manager.fullname" . }}
  labels:
    {{- include "team-manager.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "team-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "team-manager.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "team-manager.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.migrations.runAsInitContainer }}
      initContainers:
        - name: migrate
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--migrate-only"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: ALLOWED_ORIGINS
              value: {{ .Values.allowedOrigins | quote }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: DATABASE_URL
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: JWT_PRIVATE_KEY
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: JWT_PUBLIC_KEY
            - name: COOKIE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: COOKIE_ENCRYPTION_KEY
                  # Optional: config.go's loadCookieEncryptionKeys checks
                  # COOKIE_ENCRYPTION_KEYS (plural) first and, if set, never
                  # even looks at this singular key -- a Secret populated per
                  # the zero-downtime-rotation guidance in CLAUDE.md (only
                  # COOKIE_ENCRYPTION_KEYS set) must not fail pod scheduling
                  # just because this optional fallback key is absent.
                  optional: true
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: SENTRY_DSN
                  optional: true
            - name: METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: METRICS_TOKEN
                  optional: true
            - name: PAGINATION_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: PAGINATION_HMAC_KEY
                  optional: true
            - name: COOKIE_ENCRYPTION_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: COOKIE_ENCRYPTION_KEYS
                  optional: true
            {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: ALLOWED_ORIGINS
              value: {{ .Values.allowedOrigins | quote }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: DATABASE_URL
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: JWT_PRIVATE_KEY
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: JWT_PUBLIC_KEY
            - name: COOKIE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: COOKIE_ENCRYPTION_KEY
                  # Optional: config.go's loadCookieEncryptionKeys checks
                  # COOKIE_ENCRYPTION_KEYS (plural) first and, if set, never
                  # even looks at this singular key -- a Secret populated per
                  # the zero-downtime-rotation guidance in CLAUDE.md (only
                  # COOKIE_ENCRYPTION_KEYS set) must not fail pod scheduling
                  # just because this optional fallback key is absent.
                  optional: true
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: SENTRY_DSN
                  optional: true
            - name: METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: METRICS_TOKEN
                  optional: true
            - name: PAGINATION_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: PAGINATION_HMAC_KEY
                  optional: true
            - name: COOKIE_ENCRYPTION_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: COOKIE_ENCRYPTION_KEYS
                  optional: true
            {{- end }}
      # Explicit (possibly empty) volumes array: some Kubernetes admission
      # webhooks that inject a volume by name (e.g. EKS's IRSA pod-identity
      # webhook, if serviceAccount.annotations carries an IAM role ARN) apply
      # their mutation as a JSON patch "add" at /spec/volumes/0, which fails
      # if the pod has no volumes key at all — which is the case here now
      # that serviceAccount.automount defaults to false (no more
      # kubelet-injected token volume). See
      # https://github.com/aws/amazon-eks-pod-identity-webhook/issues/17.
      volumes: []
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
