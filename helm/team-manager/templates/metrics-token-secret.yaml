{{- if and .Values.monitoring.enabled .Values.monitoring.metricsToken (not .Values.monitoring.metricsTokenSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "team-manager.fullname" . }}-metrics-token
  # Must match servicemonitor.yaml's namespace -- Prometheus Operator
  # resolves a ServiceMonitor's bearerTokenSecret within the ServiceMonitor's
  # OWN namespace, not the release namespace. Without this, setting
  # monitoring.namespace to centralize the ServiceMonitor in a shared
  # "monitoring" namespace (the documented use case) silently breaks
  # scraping: the Secret stays in .Release.Namespace, unreachable from the
  # ServiceMonitor's namespace.
  namespace: {{ .Values.monitoring.namespace | default .Release.Namespace }}
  labels:
    {{- include "team-manager.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ .Values.monitoring.metricsToken | b64enc }}
{{- end }}
