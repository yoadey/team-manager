{{- if .Values.backup.enabled }}
# RTO target: 4 hours (restore from latest backup + WAL replay)
# RPO target: 24 hours (daily backup schedule, adjust via backup.schedule)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "team-manager.fullname" . }}-backup
  labels:
    {{- include "team-manager.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "team-manager.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "team-manager.serviceAccountName" . }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          containers:
          - name: pg-dump
            image: "postgres:{{ .Values.backup.postgresVersion | default "17" }}"
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              FILENAME="backup-${TIMESTAMP}.sql.gz"
              pg_dump "$DATABASE_URL" | gzip > /tmp/${FILENAME}
              {{- if .Values.backup.s3.enabled }}
              # Upload to S3 (requires aws CLI or compatible tool in a custom image)
              echo "Upload to s3://{{ .Values.backup.s3.bucket }}/${FILENAME}"
              {{- else }}
              echo "Backup written to /tmp/${FILENAME} (configure backup.s3 for remote storage)"
              {{- end }}
              echo "Backup complete: ${FILENAME}"
            env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secret" (include "team-manager.fullname" .)) }}
                  key: DATABASE_URL
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
