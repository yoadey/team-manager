{{- if .Values.backup.enabled }}
# RTO target: 4 hours (restore from latest backup + WAL replay)
# RPO target: 24 hours (daily backup schedule, adjust via backup.schedule)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "team-manager.fullname" . }}-backup
  labels:
    {{- include "team-manager.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "team-manager.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "team-manager.serviceAccountName" . }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumes:
            - name: dump
              emptyDir: {}
          initContainers:
          - name: pg-dump
            image: "postgres:{{ .Values.backup.postgresVersion | default "17" }}"
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              # --format=custom writes directly to --file (no shell pipe), and is
              # already compressed — matches docs/operations.md's documented
              # backup/restore procedure (pg_restore, not psql < dump). The
              # previous `pg_dump | gzip > file` piped through /bin/sh, which in
              # this image is dash: dash has no `pipefail`, so a failing pg_dump
              # (bad connection, disk pressure) still lets `gzip` exit 0 on empty
              # input, `set -e` never trips, and the job reports success while
              # silently producing a corrupt/empty backup.
              pg_dump --format=custom --no-owner --dbname="$DATABASE_URL" \
                --file="/backup/teammanager-${TIMESTAMP}.dump"
              echo "Dump complete: teammanager-${TIMESTAMP}.dump"
            env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secret" (include "team-manager.fullname" .)) }}
                  key: DATABASE_URL
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            volumeMounts:
              - name: dump
                mountPath: /backup
          containers:
          {{- if .Values.backup.s3.enabled }}
          - name: s3-upload
            image: "{{ .Values.backup.s3.awsCliImage }}"
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -e
              for f in /backup/*.dump; do
                echo "Uploading $f to s3://{{ .Values.backup.s3.bucket }}/{{ .Values.backup.s3.prefix }}/$(basename "$f")"
                aws s3 cp "$f" "s3://{{ .Values.backup.s3.bucket }}/{{ .Values.backup.s3.prefix }}/$(basename "$f")" \
                  {{- if .Values.backup.s3.endpoint }}
                  --endpoint-url {{ .Values.backup.s3.endpoint }} \
                  {{- end }}
                  --region {{ .Values.backup.s3.region }}
              done
              echo "Upload complete"
            {{- if .Values.backup.s3.credentialsSecretName }}
            env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backup.s3.credentialsSecretName }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backup.s3.credentialsSecretName }}
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            # When backup.s3.credentialsSecretName is unset, the AWS CLI falls
            # back to the pod's IAM role (e.g. IRSA via serviceAccount.annotations).
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            volumeMounts:
              - name: dump
                mountPath: /backup
          {{- else }}
          - name: no-op-warning
            image: "postgres:{{ .Values.backup.postgresVersion | default "17" }}"
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              echo "WARNING: backup.s3.enabled is false — the dump in /backup is NOT persisted anywhere and is discarded when this Job's pod is removed. Set backup.s3.enabled=true with a bucket to actually retain backups." >&2
              exit 1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            volumeMounts:
              - name: dump
                mountPath: /backup
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
