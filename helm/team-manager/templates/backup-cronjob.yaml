{{- if .Values.backup.enabled }}
# RTO target: 4 hours (restore from latest backup + WAL replay)
# RPO target: 24 hours (daily backup schedule, adjust via backup.schedule)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "team-manager.fullname" . }}-backup
  labels:
    {{- include "team-manager.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  # Bounds how late a missed run (e.g. the CronJob controller was down at the
  # scheduled time) may still start. Without this, Kubernetes either starts
  # an unboundedly-delayed catch-up run once the controller recovers, or --
  # past its "100 missed schedules" internal heuristic -- silently gives up
  # on the CronJob with no alert.
  startingDeadlineSeconds: {{ .Values.backup.startingDeadlineSeconds }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: {{ .Values.backup.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            {{- include "team-manager.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "team-manager.backupServiceAccountName" . }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: dump
              emptyDir:
                sizeLimit: {{ .Values.backup.dumpSizeLimit }}
            # Scratch space for readOnlyRootFilesystem containers below --
            # pg_dump and the AWS CLI both need a writable /tmp (and, for the
            # AWS CLI, a writable $HOME for its own ~/.aws/cli/cache) even
            # though neither writes anything outside that scratch dir.
            - name: tmp
              emptyDir:
                sizeLimit: {{ .Values.backup.tmpSizeLimit }}
          initContainers:
          - name: pg-dump
            image: "postgres:{{ .Values.backup.postgresVersion | default "17" }}{{ if .Values.backup.postgresImageDigest }}@{{ .Values.backup.postgresImageDigest }}{{ end }}"
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              # --format=custom writes directly to --file (no shell pipe), and is
              # already compressed — matches docs/operations.md's documented
              # backup/restore procedure (pg_restore, not psql < dump). The
              # previous `pg_dump | gzip > file` piped through /bin/sh, which in
              # this image is dash: dash has no `pipefail`, so a failing pg_dump
              # (bad connection, disk pressure) still lets `gzip` exit 0 on empty
              # input, `set -e` never trips, and the job reports success while
              # silently producing a corrupt/empty backup.
              pg_dump --format=custom --no-owner --dbname="$DATABASE_URL" \
                --file="/backup/teammanager-${TIMESTAMP}.dump"
              # pg_dump exiting 0 doesn't guarantee a *usable* dump -- e.g.
              # DATABASE_URL momentarily/permanently pointing at the wrong
              # (empty) database due to a Secret misconfiguration still
              # "succeeds" and produces a tiny but well-formed file. Without
              # this, that dump gets uploaded to S3 looking legitimate --
              # every "did a run complete" alert stays green -- and the gap
              # only surfaces when someone actually tries to restore it
              # during a real incident. pg_restore --list parses the dump's
              # table of contents without touching any database, so this
              # fails the Job loudly instead.
              ENTRY_COUNT=$(pg_restore --list "/backup/teammanager-${TIMESTAMP}.dump" | grep -c '^[0-9]')
              if [ "$ENTRY_COUNT" -lt {{ .Values.backup.minDumpEntries }} ]; then
                echo "ERROR: dump has only $ENTRY_COUNT TOC entries (expected at least {{ .Values.backup.minDumpEntries }}) -- refusing to upload a possibly empty/corrupt backup" >&2
                exit 1
              fi
              echo "Dump complete: teammanager-${TIMESTAMP}.dump ($ENTRY_COUNT TOC entries)"
            env:
            {{- if .Values.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: DATABASE_URL
            {{- end }}
            - name: TMPDIR
              value: /tmp-scratch
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              # pg_dump only ever writes to the explicit --file path under
              # /backup (and libpq's own temp files under $TMPDIR); it never
              # needs to write anywhere else in its own filesystem, so this
              # confines a compromised/malicious postgres image (supply-chain
              # issue, parsing bug) to those two mounted scratch volumes
              # instead of being able to write/overwrite arbitrary files.
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            volumeMounts:
              - name: dump
                mountPath: /backup
              - name: tmp
                mountPath: /tmp-scratch
          containers:
          {{- if .Values.backup.s3.enabled }}
          - name: s3-upload
            image: "{{ .Values.backup.s3.awsCliImage }}"
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -e
              for f in /backup/*.dump; do
                echo "Uploading $f to s3://{{ .Values.backup.s3.bucket }}/{{ .Values.backup.s3.prefix }}/$(basename "$f")"
                aws s3 cp "$f" "s3://{{ .Values.backup.s3.bucket }}/{{ .Values.backup.s3.prefix }}/$(basename "$f")" \
                  {{- if .Values.backup.s3.endpoint }}
                  --endpoint-url {{ .Values.backup.s3.endpoint }} \
                  {{- end }}
                  --region {{ .Values.backup.s3.region }}
              done
              echo "Upload complete"
            env:
            # The AWS CLI writes its own cache/config under $HOME/.aws/cli/
            # and stages multipart-upload chunks under $TMPDIR -- both need
            # to be writable even though readOnlyRootFilesystem below means
            # nothing else in this container's filesystem is.
            - name: HOME
              value: /tmp-scratch
            - name: TMPDIR
              value: /tmp-scratch
            {{- if .Values.backup.s3.credentialsSecretName }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backup.s3.credentialsSecretName }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backup.s3.credentialsSecretName }}
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            # When backup.s3.credentialsSecretName is unset, the AWS CLI falls
            # back to the pod's IAM role (e.g. IRSA via serviceAccount.annotations).
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              # aws s3 cp only reads from /backup and writes its own
              # cache/temp files under $HOME/$TMPDIR (both pointed at the
              # tmp scratch volume above); it never needs to write anywhere
              # else in its own filesystem, so this confines a
              # compromised/malicious aws-cli image (supply-chain issue,
              # parsing bug) to the two mounted scratch volumes instead of
              # being able to write/overwrite arbitrary files -- notably
              # relevant here since this container also holds S3 write
              # credentials.
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            volumeMounts:
              - name: dump
                mountPath: /backup
              - name: tmp
                mountPath: /tmp-scratch
          {{- else }}
          - name: no-op-warning
            image: "postgres:{{ .Values.backup.postgresVersion | default "17" }}{{ if .Values.backup.postgresImageDigest }}@{{ .Values.backup.postgresImageDigest }}{{ end }}"
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              echo "WARNING: backup.s3.enabled is false — the dump in /backup is NOT persisted anywhere and is discarded when this Job's pod is removed. Set backup.s3.enabled=true with a bucket to actually retain backups." >&2
              exit 1
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            volumeMounts:
              - name: dump
                mountPath: /backup
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
