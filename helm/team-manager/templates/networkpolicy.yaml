{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "team-manager.fullname" . }}
  labels:
    {{- include "team-manager.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "team-manager.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP from ingress controller and Prometheus scrape. Restrict the
    # source via networkPolicy.ingress.from (see values.yaml) — left
    # unrestricted (any source in the cluster) by default, matching prior
    # behavior; set it to scope this to your ingress controller and
    # Prometheus namespaces/pods.
    - ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
      {{- with .Values.networkPolicy.ingress.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow outbound to PostgreSQL (default 5432). Restrict the destination
    # via networkPolicy.egress.postgres.to (see values.yaml) — left
    # unrestricted by default.
    - ports:
        - port: 5432
          protocol: TCP
      {{- with .Values.networkPolicy.egress.postgres.to }}
      to:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    # Allow outbound HTTPS for Sentry and OTLP exporters. Restrict the
    # destination via networkPolicy.egress.https.to (see values.yaml).
    - ports:
        - port: 443
          protocol: TCP
        - port: 4318
          protocol: TCP
      {{- with .Values.networkPolicy.egress.https.to }}
      to:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- if and .Values.backup.enabled .Values.backup.s3.enabled }}
    # Allow outbound to the backup CronJob's S3(-compatible) endpoint. Kept
    # separate from the https rule above since a self-hosted endpoint
    # (backup.s3.endpoint, e.g. MinIO) commonly listens on a non-443 port —
    # override via networkPolicy.egress.s3.port to match it.
    - ports:
        - port: {{ .Values.networkPolicy.egress.s3.port }}
          protocol: TCP
      {{- with .Values.networkPolicy.egress.s3.to }}
      to:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
