{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "team-manager.fullname" . }}
  labels:
    {{- include "team-manager.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "team-manager.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP from ingress controller and Prometheus scrape
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow outbound to PostgreSQL (default 5432)
    - ports:
        - port: 5432
          protocol: TCP
    # Allow outbound HTTPS for Sentry and OTLP exporters
    - ports:
        - port: 443
          protocol: TCP
        - port: 4318
          protocol: TCP
{{- end }}
