{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "team-manager.fullname" . }}
  namespace: {{ .Values.monitoring.namespace | default .Release.Namespace }}
  labels:
    {{- include "team-manager.labels" . | nindent 4 }}
    {{- with .Values.monitoring.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  # Without this, an unset namespaceSelector restricts Prometheus Operator's
  # service/endpoint discovery to the ServiceMonitor's OWN namespace. That's
  # fine when monitoring.namespace is unset (ServiceMonitor and Service share
  # .Release.Namespace), but monitoring.namespace exists specifically to let
  # operators centralize ServiceMonitors in a shared "monitoring" namespace
  # (a common Prometheus Operator pattern) -- without pinning this to the
  # Service's actual namespace, that exact documented use case silently
  # discovers zero targets.
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "team-manager.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: http
    path: /metrics
    interval: {{ .Values.monitoring.scrapeInterval | default "30s" }}
    {{- if .Values.monitoring.metricsToken }}
    bearerTokenSecret:
      name: {{ include "team-manager.fullname" . }}-metrics-token
      key: token
    {{- end }}
    # Without an explicit jobLabel/relabeling, Prometheus Operator derives the
    # `job` label from this ServiceMonitor's Service name, which varies with
    # the Helm release name — silently breaking every alert/dashboard query
    # that hardcodes job="team-manager-backend". Pin it to a stable value so
    # those queries always match regardless of release name.
    relabelings:
    - targetLabel: job
      replacement: team-manager-backend
{{- end }}
