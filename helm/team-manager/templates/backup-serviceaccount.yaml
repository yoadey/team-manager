{{- if and .Values.backup.enabled .Values.backup.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "team-manager.backupServiceAccountName" . }}
  labels:
    {{- include "team-manager.labels" . | nindent 4 }}
  {{- with .Values.backup.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The backup Job only runs pg_dump/aws-cli -- no Kubernetes API calls --
# same rationale as the main serviceAccount.automount default. IRSA's
# pod-identity webhook injects its own AWS token projection based on the
# eks.amazonaws.com/role-arn annotation above regardless of this setting.
automountServiceAccountToken: false
{{- end }}
