# Production overrides — HA, autoscaling, strict resource limits.
replicaCount: 3

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
  hosts:
    - host: team-manager.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: team-manager-prod-tls
      hosts:
        - team-manager.example.com

allowedOrigins: "https://team-manager.example.com"

existingSecret: "team-manager-prod-secrets"

env:
  PORT: "8080"
  COOKIE_SECURE: "true"
  SESSION_TTL_HOURS: "720"
  OTEL_SERVICE_NAME: "team-manager-backend"
  ENVIRONMENT: "production"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2
