# Default values for team-manager.
# Override per-environment with values-staging.yaml / values-prod.yaml.

replicaCount: 2

image:
  repository: ghcr.io/yoadey/team-manager-backend
  pullPolicy: IfNotPresent
  # Defaults to Chart.appVersion when empty — but nothing bumps Chart.yaml's
  # appVersion as part of a release, so that default is a fixed placeholder,
  # not "the latest released version". ALWAYS set this explicitly (e.g.
  # 1.2.3, matching a real vX.Y.Z release tag with the v stripped) for any
  # real deployment. templates/NOTES.txt warns about this at deploy time.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # The backend makes no Kubernetes API calls (no client-go/InClusterConfig
  # usage), so there's nothing that needs the pod's own API token — leave
  # disabled unless a future feature requires it.
  automount: false
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: team-manager.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# httpGet.port is deliberately omitted here: the deployment template fills it
# in from service.targetPort, so the probes always target the same port the
# container actually listens on, even if targetPort is overridden.
#
# startupProbe gates liveness/readiness until the app has bound its HTTP
# port: main.go runs DB migrations synchronously before ListenAndServe, so
# a slow migration (e.g. CREATE INDEX CONCURRENTLY on a large table, see
# docs/operations.md) means the port isn't listening yet -- without this,
# livenessProbe's own tight timing (10s + 3*15s ~= 55s) would kill and
# restart the pod mid-migration instead of just waiting, which doesn't fix
# a slow migration and can crash-loop indefinitely. Up to ~5 minutes here
# before falling through to the (deliberately tight) liveness/readiness
# probes for the steady state.
startupProbe:
  httpGet:
    path: /healthz
  periodSeconds: 5
  failureThreshold: 60

livenessProbe:
  httpGet:
    path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - team-manager
          topologyKey: kubernetes.io/hostname

# Application environment variables.
# Secrets (DATABASE_URL, JWT keys, COOKIE_ENCRYPTION_KEY) must be supplied
# via an external secret store (e.g. external-secrets + Vault/AWS SM) and
# referenced below — never store plaintext secrets in values files.
env:
  PORT: "8080"
  COOKIE_SECURE: "true"
  SESSION_TTL_HOURS: "720"
  OTEL_SERVICE_NAME: "team-manager-backend"

# Reference to an existing Secret containing sensitive values.
# The Secret must have keys: DATABASE_URL, JWT_PRIVATE_KEY, JWT_PUBLIC_KEY,
# COOKIE_ENCRYPTION_KEY, and optionally SENTRY_DSN, PAGINATION_HMAC_KEY,
# COOKIE_ENCRYPTION_KEYS (plural — takes precedence over the singular key
# above when set; use it for zero-downtime key rotation, see docs/operations.md).
# METRICS_TOKEN is listed as optional in the Deployment template (it's fine
# to omit when env.COOKIE_SECURE is "false", e.g. local/dev), but the
# backend hard-fails startup (os.Exit(1), not just a warning) when
# COOKIE_SECURE is "true" (the default, and what every shipped environment
# overlay uses) and METRICS_TOKEN is empty — unless env.METRICS_ALLOW_OPEN
# is also set to "true". Set a METRICS_TOKEN key in this Secret for any
# COOKIE_SECURE=true deployment, or you'll get a guaranteed crash-loop.
# templates/NOTES.txt reminds you of this at deploy time.
existingSecret: ""

# ALLOWED_ORIGINS as a comma-separated list.
allowedOrigins: "https://team-manager.example.com"

networkPolicy:
  enabled: true
  ingress:
    # Restrict who may reach port 8080 by uncommenting and filling in `from`
    # below (podSelector/namespaceSelector for your ingress controller and
    # Prometheus). Left empty by default so ingress is only port-restricted
    # (any source in the cluster may reach it), matching prior behavior.
    from: []
    # from:
    #   - namespaceSelector:
    #       matchLabels:
    #         kubernetes.io/metadata.name: ingress-nginx
    #   - namespaceSelector:
    #       matchLabels:
    #         kubernetes.io/metadata.name: monitoring
  egress:
    # Restrict egress destinations by uncommenting and filling in `to` below
    # (podSelector/namespaceSelector for in-cluster Postgres, or ipBlock for
    # an external/managed database). Left empty by default so egress is only
    # port-restricted, matching prior behavior.
    postgres:
      to: []
      # to:
      #   - ipBlock:
      #       cidr: 10.0.1.0/24
    https:
      to: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1

monitoring:
  enabled: false        # Set to true when Prometheus Operator is installed
  namespace: ""         # Override to deploy ServiceMonitor to a different namespace
  scrapeInterval: "30s"
  # If set, creates a Secret with this bearer token for the ServiceMonitor's
  # scrape credential. Must match the METRICS_TOKEN key inside the app's own
  # `existingSecret` — the two are independent Secrets with no validation
  # tying them together; a mismatch causes Prometheus to get silent 401s from
  # /metrics with no obvious link back to this setting.
  metricsToken: ""
  additionalLabels: {}  # Labels to help Prometheus Operator find this ServiceMonitor

migrations:
  runAsInitContainer: true   # Run DB migrations as an initContainer before the app starts

backup:
  enabled: false           # Enable daily PostgreSQL backup CronJob
  schedule: "0 2 * * *"   # Daily at 02:00 UTC
  startingDeadlineSeconds: 900  # How late a missed run may still start before Kubernetes gives up on it
  postgresVersion: "17"
  retentionDays: 30        # Informational; enforce via S3 bucket lifecycle rules
  s3:
    enabled: false          # When false, the dump is discarded (job fails loudly instead of silently losing data)
    awsCliImage: "amazon/aws-cli:2.31.13"
    bucket: ""
    prefix: "team-manager"
    region: "eu-central-1"
    endpoint: ""            # Override for S3-compatible storage (MinIO, etc.)
    credentialsSecretName: "" # Secret with AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY; leave empty to use the pod's IAM role (e.g. IRSA via serviceAccount.annotations)
