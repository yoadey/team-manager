# Local development only -- not a production deployment manifest. Postgres
# credentials default to a well-known value, the DB port is published to the
# host, and COOKIE_SECURE is hardcoded to "false" (plaintext-HTTP session
# cookies). Override POSTGRES_USER/POSTGRES_PASSWORD/POSTGRES_DB via .env for
# anything beyond a throwaway local instance; see helm/ for production.
services:
  postgres:
    # Pin to an immutable digest for reproducible local dev. Dependabot's
    # docker ecosystem entry for directory / (.github/dependabot.yml) keeps
    # this digest current automatically.
    # Digest below resolved 2026-07-08 from registry-1.docker.io for postgres:17
    # (docker-library/postgres 17.10). Re-resolved from the prior pin, which
    # CI's security-container-backup Trivy scan (ci.yml) caught shipping a
    # stale bundled gosu binary with real, fixed-upstream Go stdlib CVEs --
    # any point-in-time digest pin will eventually accrue newly-published
    # CVEs against its frozen package versions; re-resolve periodically.
    image: postgres:17@sha256:de1e13ca94377fa5a27aafd0e9fc200df9692b15152f0090fdf074074ea5e397
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teammanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teammanager}
      POSTGRES_DB: ${POSTGRES_DB:-teammanager}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teammanager"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  minio:
    # Local development only -- stands in for the S3-compatible object store
    # (internal/storage) that production points at via the S3_* env vars (see
    # helm/'s values.yaml). Pinned to an immutable digest for reproducible
    # local dev, matching this file's other images; Dependabot's docker
    # ecosystem entry for directory / (.github/dependabot.yml) keeps this
    # digest current automatically.
    # Digest below resolved 2026-07-18 from registry-1.docker.io for minio/minio:latest.
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-teammanager}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-teammanager123}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console (http://localhost:9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  # One-shot job that creates the image bucket, then exits. minio/minio
  # itself has no admin CLI baked in -- minio/mc is the dedicated client image
  # for that. `backend` waits on this via service_completed_successfully so
  # the bucket always exists before the first upload request.
  minio-init:
    image: minio/mc:latest@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    environment:
      # mc auto-registers an alias from MC_HOST_<alias> at startup, so this
      # replaces the explicit `mc alias set local ... <user> <password>` call
      # that used to bake the credentials into this container's Entrypoint/
      # Cmd (visible in plaintext via `docker inspect`/`ps`, unlike every
      # other credential in this file, which goes through `environment:`).
      MC_HOST_local: http://${MINIO_ROOT_USER:-teammanager}:${MINIO_ROOT_PASSWORD:-teammanager123}@minio:9000
      MC_BUCKET: ${S3_BUCKET:-team-manager-images}
    entrypoint: ["/bin/sh", "-c", "mc mb --ignore-existing local/$$MC_BUCKET"]
    restart: "no"

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      # The distroless/static image has no shell/wget, so this must be the
      # exec form invoking the /healthcheck binary directly (see backend
      # Dockerfile) rather than "CMD-SHELL wget ... || exit 1", which can
      # never exec and always reports unhealthy.
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-teammanager}:${POSTGRES_PASSWORD:-teammanager}@postgres:5432/${POSTGRES_DB:-teammanager}?sslmode=disable
      PORT: 8080
      ALLOWED_ORIGINS: http://localhost:5173
      # Public frontend origin used to build shareable invite links.
      # Defaults to the first ALLOWED_ORIGINS entry when unset.
      PUBLIC_BASE_URL: http://localhost:5173
      # Set JWT keys via .env or override here for dev
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      # Session cookie: insecure over local http; auto-generates an ephemeral
      # encryption key when COOKIE_ENCRYPTION_KEY is unset.
      COOKIE_SECURE: "false"
      COOKIE_ENCRYPTION_KEY: ${COOKIE_ENCRYPTION_KEY:-}
      # Object storage for team/user photos and logos -- points at the local
      # MinIO service above. S3_PUBLIC_BASE_URL rewrites presigned URLs from
      # the in-network "minio:9000" host (unreachable from the browser) to
      # the published localhost port.
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-team-manager-images}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-teammanager}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-teammanager123}
      S3_USE_PATH_STYLE: "true"
      S3_PUBLIC_BASE_URL: http://localhost:9000
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  frontend:
    # Pin to an immutable digest, matching this file's postgres service.
    # Dependabot's docker ecosystem entry for directory / (.github/dependabot.yml)
    # keeps this digest current automatically.
    # Digest below resolved 2026-07-04 from registry-1.docker.io for node:22-alpine.
    image: node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 256M

volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
