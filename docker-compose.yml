services:
  postgres:
    # Pin to an immutable digest for reproducible local dev. Dependabot's
    # docker ecosystem entry for directory / (.github/dependabot.yml) keeps
    # this digest current automatically.
    # Digest below resolved 2026-07-01 from registry-1.docker.io for postgres:17
    # (docker-library/postgres 17.10).
    image: postgres:17@sha256:5c855ad7b85e68e48a62f34662853f38b57c1c1d80f3a927ab58034fd6d31c5e
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teammanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teammanager}
      POSTGRES_DB: ${POSTGRES_DB:-teammanager}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teammanager"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-teammanager}:${POSTGRES_PASSWORD:-teammanager}@postgres:5432/${POSTGRES_DB:-teammanager}?sslmode=disable
      PORT: 8080
      ALLOWED_ORIGINS: http://localhost:5173
      # Public frontend origin used to build shareable invite links.
      # Defaults to the first ALLOWED_ORIGINS entry when unset.
      PUBLIC_BASE_URL: http://localhost:5173
      # Set JWT keys via .env or override here for dev
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      # Session cookie: insecure over local http; auto-generates an ephemeral
      # encryption key when COOKIE_ENCRYPTION_KEY is unset.
      COOKIE_SECURE: "false"
      COOKIE_ENCRYPTION_KEY: ${COOKIE_ENCRYPTION_KEY:-}
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 256M

volumes:
  postgres_data:
  frontend_node_modules:
