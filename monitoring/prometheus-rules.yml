groups:
  # ── Availability ─────────────────────────────────────────────────────────────

  - name: availability
    rules:
      - alert: BackendDown
        expr: up{job="team-manager-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend instance down"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(teammanager_http_requests_total{job="team-manager-backend", status=~"5.."}[5m]))
          /
          sum(rate(teammanager_http_requests_total{job="team-manager-backend"}[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%) over the last 5 minutes."

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum(rate(teammanager_http_request_duration_seconds_bucket{job="team-manager-backend"}[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency above 2 s"
          description: "P99 request latency is {{ $value | humanizeDuration }}."

  # ── Rate Limiting ─────────────────────────────────────────────────────────────

  - name: rate_limiting
    rules:
      - alert: RateLimitSpike
        expr: |
          sum(rate(teammanager_rate_limit_hits_total[5m])) by (context) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Sustained rate-limit hits on {{ $labels.context }} limiter"
          description: "{{ $value | humanize }} req/s are being rejected by the {{ $labels.context }} rate limiter. Possible brute-force or misconfigured client."

  # ── Domain Events ─────────────────────────────────────────────────────────────

  - name: domain_events
    rules:
      - alert: LoginFailureSpike
        expr: |
          sum(rate(teammanager_login_attempts_total{outcome="failure"}[10m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Login failure spike detected"
          description: "{{ $value | humanize }} failed login attempts/s over the last 10 minutes."

      - alert: BulkMemberDeletion
        expr: |
          sum(increase(teammanager_domain_events_total{module="member", operation="delete"}[5m])) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Bulk member deletion detected"
          description: "{{ $value }} member deletions in the last 5 minutes — may be accidental or malicious."

  # ── Database ──────────────────────────────────────────────────────────────────

  - name: database
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          teammanager_pgxpool_acquired_conns{job="team-manager-backend"}
          / teammanager_pgxpool_max_conns{job="team-manager-backend"} > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "{{ $value | humanizePercentage }} of the pool's max connections are acquired — pool may be exhausted."

      - alert: SlowQueriesDetected
        expr: |
          increase(teammanager_slow_queries_total[10m]) > 20
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Elevated slow query count"
          description: "{{ $value }} queries exceeded the slow-query threshold in the last 10 minutes."

  # ── Infrastructure ────────────────────────────────────────────────────────────

  - name: infrastructure
    rules:
      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes{job="team-manager-backend"}
          / on() group_left() node_memory_MemTotal_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend memory usage above 85%"
          description: "Memory usage is {{ $value | humanizePercentage }}."

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space below 10%"
          description: "Available disk space on {{ $labels.instance }} is {{ $value | humanizePercentage }}."
