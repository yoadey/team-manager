# Shared security headers, mirroring the Vite dev-server headers in
# vite.config.ts. Included inside each location block because nginx's add_header
# inheritance is replaced (not merged) when a child block declares its own
# add_header directives.
add_header Content-Security-Policy "frame-ancestors 'none'" always;
add_header X-Frame-Options          "DENY"                            always;
add_header X-Content-Type-Options   "nosniff"                         always;
add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
# Matches backend/internal/middleware/security.go's SecurityHeaders. Harmless
# to send on a plain-http response (browsers ignore HSTS unless the response
# came over https), but without it the browser never caches an
# HTTPS-only instruction for this origin -- a user's first visit over a
# http:// link, or a network-level SSL-stripping MITM, could otherwise
# silently downgrade the connection to the actual page users load (the API
# host was already protected, this origin was not).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
