# Production SPA server for the Teamverwaltung frontend.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip text assets (the JS/CSS bundles are the bulk of the payload).
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # Container liveness/readiness probe (see Dockerfile HEALTHCHECK).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Defense-in-depth: the Dockerfile already strips *.map from the build
    # output, but never serve source maps from production even if one slips
    # through — they let anyone reconstruct readable original source.
    location ~* \.map$ {
        return 404;
    }

    # Content-hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        include    /etc/nginx/conf.d/security-headers.conf;
        expires    1y;
        add_header Cache-Control "public, immutable" always;
        try_files  $uri =404;
    }

    # SPA entry point: never cache index.html so new deploys are picked up, and
    # fall back to it for client-side routes.
    location / {
        include    /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files  $uri $uri/ /index.html;
    }
}
