name: Release

# Builds and publishes versioned container images for the backend and frontend
# to the GitHub Container Registry (GHCR) on every semver tag. CI (ci.yml) gates
# correctness; this workflow produces the deployable, immutable artifacts.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v1.2.3); defaults to the commit SHA'
        required: false
        type: string

permissions:
  contents: read

# Queue (never cancel) concurrent runs for the same ref: two parallel runs for
# the same tag could race pushing the same image tag to GHCR. Unlike ci.yml,
# this workflow must NOT set cancel-in-progress -- a release publish is a
# deliberate, rare, one-off event, not a rapid-iteration PR push, and
# cancelling one mid-push could leave a tag partially published.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io

jobs:
  images:
    name: Build & push ${{ matrix.component }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for keyless cosign signing/attestation via GitHub's own OIDC
      # token -- no long-lived signing key/secret to manage or leak.
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: backend
            trivyignores: ''
          - component: frontend
            context: frontend
            # Mirrors ci.yml's security-container-frontend job and
            # scheduled-security-scan.yml's container-frontend job: without
            # this, CVE-2026-33630 (c-ares use-after-free in the pinned
            # nginx-unprivileged base, not yet fixed upstream as of
            # 2026-07-10 -- see the file itself) fails this scan on every
            # release cut, since ignore-unfixed alone does not filter it out.
            trivyignores: .github/trivyignore-frontend.txt
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve version
        id: version
        env:
          # Passed via env rather than interpolated directly into the script
          # below: workflow_dispatch inputs are attacker-controlled text, and
          # templating them straight into a run: block is a shell-injection
          # vector (a crafted "version" could execute arbitrary commands in a
          # job that holds packages:write and a GHCR login).
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$VERSION_INPUT" ]; then
            echo "value=$VERSION_INPUT" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build & push
        id: build
        # No platforms: key -> buildx defaults to the runner's native platform
        # only (linux/amd64 on ubuntu-latest), even though both Dockerfiles
        # pin multi-arch manifest-list base images. Every published GHCR tag
        # is amd64-only today; deploying to an arm64 node pool (e.g. AWS
        # Graviton) would fail to pull with "no matching manifest". This is a
        # deliberate scope decision, not an oversight -- multi-arch builds
        # roughly double this job's build time/GHA minutes for a platform
        # this project doesn't currently target. Add
        # `platforms: linux/amd64,linux/arm64` here if that changes.
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          # Build args are consumed only by the frontend Dockerfile; the backend
          # ignores unknown args, so a single block is safe for both.
          build-args: |
            VITE_BUILD_VERSION=${{ steps.version.outputs.value }}
            VITE_BUILD_COMMIT=${{ github.sha }}

      # Neither the source-tree SBOM below nor the Trivy scan already in
      # ci.yml cover the actual published image: that SBOM scans ./backend as
      # a Go module tree, and ci.yml's Trivy target is a throwaway `:ci`
      # image that's never pushed and unrelated to this digest. Without a
      # scan here, a tag cut days or weeks after the corresponding commit
      # merged to main -- a common release cadence -- could publish, sign,
      # and attest an image carrying CVEs disclosed against its base image or
      # dependencies in that window, with nothing in this workflow ever
      # having looked for them.
      - name: Scan published image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: ${{ matrix.trivyignores }}

      # Everything below signs and attests the exact digest just pushed, not
      # a tag (tags are mutable and could be repointed after the fact) --
      # `cosign verify`/`verify-attestation` against the digest is the only
      # way to answer "was this specific artifact built by this workflow and
      # not tampered with since".
      - name: Generate image SBOM (SPDX)
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: ${{ matrix.component }}-image-sbom.spdx.json
          upload-artifact: false

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.component }}-image-sbom
          path: ${{ matrix.component }}-image-sbom.spdx.json
          retention-days: 90

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless)
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component }}@${{ steps.build.outputs.digest }}"

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --predicate ${{ matrix.component }}-image-sbom.spdx.json \
            --type spdxjson \
            "${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component }}@${{ steps.build.outputs.digest }}"
