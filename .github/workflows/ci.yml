name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend · Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    name: Frontend · Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  frontend-test:
    name: Frontend · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  frontend-security:
    name: Frontend · Security audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run audit:ci

  frontend-build:
    name: Frontend · Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-typecheck, frontend-test]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Enforce bundle size budget
        run: npm run check:bundle
      - name: Report bundle size
        if: always()
        run: |
          echo "### Bundle size (gzipped)" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            import('fs').then(({readdirSync, readFileSync}) => {
              import('zlib').then(({gzipSync}) => {
                const files = readdirSync('dist/assets').filter(f => f.endsWith('.js'));
                let total = 0;
                for (const f of files.sort()) {
                  const kb = (gzipSync(readFileSync('dist/assets/' + f), {level:9}).length / 1024).toFixed(1);
                  total += parseFloat(kb);
                  console.log(kb + ' KB\t' + f);
                }
                console.log(total.toFixed(1) + ' KB\tTOTAL');
              });
            });
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || \
          { du -h dist/assets/*.js 2>/dev/null || true; } >> "$GITHUB_STEP_SUMMARY"
      - name: Generate SBOM
        run: npm run sbom
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-bundle-stats
          path: frontend/dist/stats.html
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: frontend/sbom.json
          retention-days: 30

  frontend-e2e:
    name: Frontend · E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-build]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=html
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  frontend-lighthouse:
    name: Frontend · Lighthouse CI
    runs-on: ubuntu-latest
    needs: [frontend-build]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ── Backend ───────────────────────────────────────────────────────────────

  backend-lint:
    name: Backend · Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: backend

  backend-test:
    name: Backend · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: docker/setup-buildx-action@v3
      - run: go test ./... -race -count=1 -coverprofile=coverage.out -timeout=300s
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  backend-build:
    name: Backend · Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go build -v -ldflags="-s -w" -o bin/server ./cmd/server
      - uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/bin/server
          retention-days: 7

  backend-security:
    name: Backend · Security (govulncheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  backend-coverage:
    name: Backend · Coverage gate
    runs-on: ubuntu-latest
    needs: [backend-test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: docker/setup-buildx-action@v3
      - name: Run tests with coverage
        run: go test ./... -race -count=1 -coverprofile=coverage.out -timeout=300s
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
      - name: Enforce minimum coverage threshold
        # The gate measures business-logic packages only. Generated code
        # (internal/gen) and infra/wiring packages (cmd/server, internal/db,
        # internal/server, internal/jobs, internal/testutil) carry little to no
        # test coverage by design and previously diluted the total, forcing a
        # vacuous 15% floor. Filtering them yields a number that reflects real
        # test depth on the code that holds the logic. Ratchet this floor upward
        # as coverage grows: the unit-only baseline is ~22% and CI additionally
        # runs the testcontainers integration tests, so the reported number sits
        # comfortably above this 25% floor. Tighten it once the live CI figure is
        # observed.
        run: |
          grep -vE '/internal/gen/|/cmd/server/|/internal/db/|/internal/server/|/internal/jobs/|/internal/testutil/' \
            coverage.out > coverage.business.out
          total=$(go tool cover -func=coverage.business.out | awk '/^total:/ {gsub("%",""); print $3}')
          echo "Business-logic coverage: ${total}%"
          awk -v total="$total" 'BEGIN { if (total+0 < 25) { print "Coverage " total "% below 25% threshold"; exit 1 } }'

  security-sast:
    name: Security · SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: [go, typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  security-container:
    name: Security · Container scan (Trivy)
    runs-on: ubuntu-latest
    needs: [backend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t team-manager-backend:ci backend/
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: team-manager-backend:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
