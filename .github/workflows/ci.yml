name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend · Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    name: Frontend · Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  frontend-test:
    name: Frontend · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  frontend-security:
    name: Frontend · Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run audit:ci

  frontend-build:
    name: Frontend · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-lint, frontend-typecheck, frontend-test]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Enforce bundle size budget
        run: npm run check:bundle
      - name: Report bundle size
        if: always()
        run: |
          echo "### Bundle size (gzipped)" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            import('fs').then(({readdirSync, readFileSync}) => {
              import('zlib').then(({gzipSync}) => {
                const files = readdirSync('dist/assets').filter(f => f.endsWith('.js'));
                let total = 0;
                for (const f of files.sort()) {
                  const kb = (gzipSync(readFileSync('dist/assets/' + f), {level:9}).length / 1024).toFixed(1);
                  total += parseFloat(kb);
                  console.log(kb + ' KB\t' + f);
                }
                console.log(total.toFixed(1) + ' KB\tTOTAL');
              });
            });
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || \
          { du -h dist/assets/*.js 2>/dev/null || true; } >> "$GITHUB_STEP_SUMMARY"
      - name: Generate SBOM
        run: npm run sbom
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: frontend-bundle-stats
          path: frontend/dist/stats.html
          retention-days: 7
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-sbom
          path: frontend/sbom.json
          retention-days: 30

  frontend-e2e:
    name: Frontend · E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [frontend-build]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=html
        env:
          CI: 'true'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  frontend-lighthouse:
    name: Frontend · Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-build]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ── Backend ───────────────────────────────────────────────────────────────

  backend-lint:
    name: Backend · Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          # Pinned for reproducible lint results (was "latest", which drifts and
          # can change findings between runs). Latest v2 line; bump deliberately.
          version: v2.12.2
          working-directory: backend

  backend-test:
    name: Backend · Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - run: go test ./... -race -count=1 -coverprofile=coverage.out -timeout=300s
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  backend-build:
    name: Backend · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-lint, backend-test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go build -v -ldflags="-s -w" -o bin/server ./cmd/server
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-binary
          path: backend/bin/server
          retention-days: 7
      - name: Generate backend SBOM (SPDX)
        uses: anchore/sbom-action@v0.18.0
        with:
          path: ./backend
          format: spdx-json
          output-file: backend-sbom.spdx.json
          upload-artifact: false
      - uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: backend-sbom.spdx.json
          retention-days: 30

  backend-licenses:
    name: Backend · License check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-build]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest
      - name: Report all dependency licenses
        run: go-licenses report ./... 2>/dev/null > licenses.csv || true
      - name: Check for GPL/AGPL licenses
        run: |
          if grep -qE '\b(GPL|AGPL)\b' licenses.csv 2>/dev/null; then
            echo "WARNING: GPL/AGPL licensed dependencies found:"
            grep -E '\b(GPL|AGPL)\b' licenses.csv
          else
            echo "No GPL/AGPL licenses detected."
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-licenses
          path: backend/licenses.csv
          retention-days: 30

  backend-security:
    name: Backend · Security (govulncheck)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  backend-coverage:
    name: Backend · Coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Run tests with coverage
        run: go test ./... -race -count=1 -coverprofile=coverage.out -timeout=300s
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
      - name: Enforce minimum coverage threshold
        # The gate measures business-logic packages only. Generated code
        # (internal/gen) and infra/wiring packages (cmd/server, internal/db,
        # internal/server, internal/jobs, internal/testutil) carry little to no
        # test coverage by design and previously diluted the total, forcing a
        # vacuous 15% floor. Filtering them yields a number that reflects real
        # test depth on the code that holds the logic. Ratchet this floor upward
        # as coverage grows: CI (with testcontainers integration tests) reports
        # ~40%, so this 35% floor leaves headroom for normal fluctuation while
        # still catching real regressions.
        run: |
          grep -vE '/internal/gen/|/cmd/server/|/internal/db/|/internal/server/|/internal/jobs/|/internal/testutil/' \
            coverage.out > coverage.business.out
          total=$(go tool cover -func=coverage.business.out | awk '/^total:/ {gsub("%",""); print $3}')
          echo "Business-logic coverage: ${total}%"
          awk -v total="$total" 'BEGIN { if (total+0 < 35) { print "Coverage " total "% below 35% threshold"; exit 1 } }'

  security-sast:
    name: Security · SAST (CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: [go, typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3

  security-secrets:
    name: Security · Secret scanning (TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@e42153d44a5e5c37c1bd0c70e074781e9edcb760 # v3.88.28
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  backend-migration-rollback:
    name: Backend · Migration rollback test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      - name: Apply all migrations
        run: goose -dir internal/db/migrations postgres "$DATABASE_URL" up
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test?sslmode=disable
      - name: Roll back all migrations
        run: goose -dir internal/db/migrations postgres "$DATABASE_URL" down-to 0
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test?sslmode=disable
      - name: Re-apply all migrations (verify idempotency)
        run: goose -dir internal/db/migrations postgres "$DATABASE_URL" up
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test?sslmode=disable

  security-container:
    name: Security · Container scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build backend image
        run: docker build -t team-manager-backend:ci backend/
      - name: Scan image for vulnerabilities
        # Pinned to an immutable release tag rather than @master. trivy-action
        # was hit by a tag-hijacking supply-chain attack; a mutable branch ref
        # like @master is exactly the exposure that enables. v0.36.0 is covered
        # by GitHub's immutable-releases protection (commit ed142fd). Further
        # hardening: pin to the full commit SHA.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: team-manager-backend:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  dast:
    name: DAST — OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-build]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build backend
        working-directory: backend
        run: go build -o server ./cmd/server

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/testdb?sslmode=disable
          COOKIE_SECURE: "false"
          PORT: "8080"
        run: |
          ./server &
          echo $! > /tmp/server.pid
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && break
            sleep 1
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-report-zap

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/server.pid) || true
