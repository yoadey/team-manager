name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Least-privilege default: most jobs only need to read the repo checkout.
# Jobs that need more (e.g. security-sast's security-events: write) declare
# their own `permissions:` block, which overrides this default.
permissions:
  contents: read

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend · Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    name: Frontend · Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  frontend-test:
    name: Frontend · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  frontend-security:
    name: Frontend · Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run audit:ci

  frontend-build:
    name: Frontend · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-lint, frontend-typecheck, frontend-test]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Enforce bundle size budget
        run: npm run check:bundle
      - name: Report bundle size
        if: always()
        run: |
          echo "### Bundle size (gzipped)" >> "$GITHUB_STEP_SUMMARY"
          node -e "
            import('fs').then(({readdirSync, readFileSync}) => {
              import('zlib').then(({gzipSync}) => {
                const files = readdirSync('dist/assets').filter(f => f.endsWith('.js'));
                let total = 0;
                for (const f of files.sort()) {
                  const kb = (gzipSync(readFileSync('dist/assets/' + f), {level:9}).length / 1024).toFixed(1);
                  total += parseFloat(kb);
                  console.log(kb + ' KB\t' + f);
                }
                console.log(total.toFixed(1) + ' KB\tTOTAL');
              });
            });
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || \
          { du -h dist/assets/*.js 2>/dev/null || true; } >> "$GITHUB_STEP_SUMMARY"
      - name: Generate SBOM
        run: npm run sbom
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: frontend-bundle-stats
          path: frontend/dist/stats.html
          retention-days: 7
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-sbom
          path: frontend/sbom.json
          retention-days: 30

  frontend-e2e:
    name: Frontend · E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [frontend-build]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=html
        env:
          CI: 'true'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  frontend-lighthouse:
    name: Frontend · Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-build]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ── Backend ───────────────────────────────────────────────────────────────

  backend-openapi-drift:
    name: Backend · OpenAPI codegen drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # Reads the version straight from backend/Makefile (kept in sync with
      # go.mod by backend-lint's "tool-version pins" check below) instead of a
      # third hardcoded copy of the pin.
      - name: Install oapi-codegen
        run: |
          set -euo pipefail
          version=$(grep -oP 'oapi-codegen/v2/cmd/oapi-codegen@\K\S+' backend/Makefile)
          go install "github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@$version"
      - name: Regenerate backend/internal/gen/api.gen.go
        run: cd backend && make generate
      - name: npm ci (frontend, for openapi-typescript)
        working-directory: frontend
        run: npm ci
      - name: Regenerate frontend/src/api/types.gen.ts
        run: make generate-ts
      # backend/internal/gen/api.gen.go is marked "DO NOT EDIT" and
      # frontend/src/api/types.gen.ts is likewise generated; both must be
      # regenerated and committed whenever openapi.yaml changes. Without this
      # check, a PR that edits the spec but forgets (or loses to a merge
      # conflict) the regeneration step passes every other job green with the
      # client/server contract silently out of sync.
      - name: Fail if generated code is out of sync with openapi.yaml
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- backend/internal/gen/api.gen.go frontend/src/api/types.gen.ts; then
            echo "::error::backend/internal/gen/api.gen.go and/or frontend/src/api/types.gen.ts are out of sync with backend/openapi/openapi.yaml. Run 'make generate && make generate-ts' at the repo root and commit the result."
            exit 1
          fi

  backend-lint:
    name: Backend · Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # goose/oapi-codegen are pinned in Makefile's `tools` target to match
      # go.mod (so the installed CLI agrees with the library version the rest
      # of the build depends on), and golangci-lint is pinned in Makefile to
      # match this job's golangci-lint-action version (so local `make lint`
      # and CI agree on findings) — but those pins live in plain shell/YAML
      # text that Dependabot's gomod ecosystem entry never touches when it
      # bumps go.mod, so a merged dependency bump could silently desync them.
      # This step turns that into a hard CI failure instead of a silent drift.
      - name: Verify tool-version pins stay in sync
        working-directory: .
        run: |
          set -euo pipefail
          goose_gomod=$(grep -oP 'github\.com/pressly/goose/v3 \K\S+' backend/go.mod)
          goose_makefile=$(grep -oP 'goose/v3/cmd/goose@\K\S+' backend/Makefile)
          if [ "$goose_gomod" != "$goose_makefile" ]; then
            echo "::error::goose version mismatch: go.mod has $goose_gomod, backend/Makefile pins $goose_makefile"
            exit 1
          fi
          goose_ci=$(grep -oP '^\s*run: go install github\.com/pressly/goose/v3/cmd/goose@\K\S+' .github/workflows/ci.yml | sort -u)
          if [ "$(echo "$goose_ci" | wc -l)" != "1" ] || [ "$goose_gomod" != "$goose_ci" ]; then
            echo "::error::goose version mismatch: go.mod has $goose_gomod, ci.yml pins [$goose_ci]"
            exit 1
          fi

          oapi_gomod=$(grep -oP 'github\.com/oapi-codegen/oapi-codegen/v2 \K\S+' backend/go.mod)
          oapi_makefile=$(grep -oP 'oapi-codegen/v2/cmd/oapi-codegen@\K\S+' backend/Makefile)
          if [ "$oapi_gomod" != "$oapi_makefile" ]; then
            echo "::error::oapi-codegen version mismatch: go.mod has $oapi_gomod, backend/Makefile pins $oapi_makefile"
            exit 1
          fi

          lint_makefile=$(grep -oP 'golangci-lint@\K\S+' backend/Makefile)
          lint_ci=$(grep -A5 '^\s*uses: golangci/golangci-lint-action@' .github/workflows/ci.yml | grep -oP '^\s*version:\s*\K\S+' | head -1)
          if [ "$lint_makefile" != "$lint_ci" ]; then
            echo "::error::golangci-lint version mismatch: backend/Makefile pins $lint_makefile, ci.yml pins $lint_ci"
            exit 1
          fi
          echo "Tool-version pins are in sync (goose $goose_gomod, oapi-codegen $oapi_gomod, golangci-lint $lint_makefile)."
      - name: Forbid hardcoded RFC 9457 type-URI literals outside apierror
        # internal/apierror is the single source of truth for the Problem
        # Details `type` field (honors ERROR_TYPE_BASE_URI). Multiple rounds
        # of review found handlers/middleware hand-rolling their own
        # "https://teammanager.example/errors/..." literal instead of calling
        # into apierror, silently bypassing that override in production. This
        # guards against the bug class recurring.
        run: |
          set -euo pipefail
          hits=$(grep -rn 'https://teammanager\.example/errors/' --include='*.go' . | grep -v '^\./internal/apierror/' || true)
          if [ -n "$hits" ]; then
            echo "::error::Found hardcoded RFC 9457 type-URI literals outside internal/apierror/ — use apierror.New/apierror.BadRequest/etc. instead so ERROR_TYPE_BASE_URI is honored:"
            echo "$hits"
            exit 1
          fi
          echo "No hardcoded RFC 9457 type-URI literals found outside internal/apierror/."
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          # Pinned for reproducible lint results (was "latest", which drifts and
          # can change findings between runs). Latest v2 line; bump deliberately.
          version: v2.12.2
          working-directory: backend

  backend-test:
    name: Backend · Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - run: go test ./... -race -count=1 -coverprofile=coverage.out -timeout=300s
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  backend-build:
    name: Backend · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-lint, backend-test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go build -v -ldflags="-s -w" -o bin/server ./cmd/server
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-binary
          path: backend/bin/server
          retention-days: 7
      - name: Generate backend SBOM (SPDX)
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
        with:
          path: ./backend
          format: spdx-json
          output-file: backend-sbom.spdx.json
          upload-artifact: false
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-sbom
          path: backend-sbom.spdx.json
          retention-days: 30

  backend-licenses:
    name: Backend · License check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # No needs: -- this only runs go-licenses report against source, never
    # consuming backend-build's binary/SBOM artifacts, so it doesn't need to
    # wait on that job and can run in parallel with lint/test/build.
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0
      - name: Report all dependency licenses
        id: licenses
        # go-licenses is known to be brittle (crashes on some generics/newer-Go
        # packages), so this step deliberately doesn't hard-fail the job on a
        # tool crash — but it must not silently report "no GPL/AGPL found" in
        # that case either, since an empty/partial licenses.csv would make the
        # next step's grep look identical to a real clean scan (the same
        # silent-false-green shape the migration-safety job had before it was
        # fixed to distinguish "nothing found" from "couldn't check").
        run: |
          set +e
          go-licenses report ./... 2>go-licenses.stderr > licenses.csv
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::go-licenses report failed (exit $status) — the GPL/AGPL check below is skipped and cannot be trusted this run. See the uploaded go-licenses.stderr artifact."
            cat go-licenses.stderr
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check for GPL/AGPL licenses
        run: |
          if [ "${{ steps.licenses.outputs.failed }}" = "true" ]; then
            echo "::warning::Skipping GPL/AGPL check — license report generation failed above."
            exit 0
          fi
          if grep -qE '\b(GPL|AGPL)\b' licenses.csv 2>/dev/null; then
            echo "::error::GPL/AGPL licensed dependencies found:"
            grep -E '\b(GPL|AGPL)\b' licenses.csv
            exit 1
          else
            echo "No GPL/AGPL licenses detected."
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: backend-licenses
          path: |
            backend/licenses.csv
            backend/go-licenses.stderr
          retention-days: 30

  backend-security:
    name: Backend · Security (govulncheck)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      - run: govulncheck ./...

  backend-coverage:
    name: Backend · Coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [backend-test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      # Reuses the coverage.out backend-test already produced and uploaded,
      # instead of re-running the entire (slow, Testcontainers-based) suite a
      # second time from scratch just to recompute this gate.
      - name: Download coverage from backend-test
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: backend-coverage
          path: backend/
      - name: Enforce minimum coverage threshold
        # The gate measures business-logic packages only. Generated code
        # (internal/gen) and infra/wiring packages (cmd/server, internal/db,
        # internal/server, internal/jobs, internal/testutil) carry little to no
        # test coverage by design and previously diluted the total, forcing a
        # vacuous 15% floor. Filtering them yields a number that reflects real
        # test depth on the code that holds the logic. Ratchet this floor upward
        # as coverage grows: CI (with testcontainers integration tests) reports
        # ~40%, so this 35% floor leaves headroom for normal fluctuation while
        # still catching real regressions.
        run: |
          grep -vE '/internal/gen/|/cmd/server/|/internal/db/|/internal/server/|/internal/jobs/|/internal/testutil/' \
            coverage.out > coverage.business.out
          total=$(go tool cover -func=coverage.business.out | awk '/^total:/ {gsub("%",""); print $3}')
          echo "Business-logic coverage: ${total}%"
          awk -v total="$total" 'BEGIN { if (total+0 < 35) { print "Coverage " total "% below 35% threshold"; exit 1 } }'

  security-sast:
    name: Security · SAST (CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: [go, typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3

  security-secrets:
    name: Security · Secret scanning (TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@e42153d44a5e5c37c1bd0c70e074781e9edcb760 # v3.88.28
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          # --results=verified restricts findings (and therefore the --fail
          # exit, which the action's composite script already passes
          # unconditionally) to verified secrets only, so unverified/
          # false-positive matches never break the build. Do NOT add --fail
          # here too: the underlying trufflehog CLI rejects a repeated
          # --fail flag ("flag 'fail' cannot be repeated"), which fails the
          # job outright regardless of scan results.
          extra_args: --results=verified

  backend-migration-rollback:
    name: Backend · Migration rollback test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.24.2
      - name: Apply all migrations
        run: goose -dir internal/db/migrations postgres "$DATABASE_URL" up
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test?sslmode=disable
      - name: Roll back all migrations
        run: goose -dir internal/db/migrations postgres "$DATABASE_URL" down-to 0
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test?sslmode=disable
      - name: Re-apply all migrations (verify idempotency)
        run: goose -dir internal/db/migrations postgres "$DATABASE_URL" up
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test?sslmode=disable

  backend-migration-safety:
    name: Backend · Migration safety lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only meaningful with a base ref to diff against; only lints migration
    # files added/changed in this PR, so it never flags already-applied
    # migrations (e.g. 00007/00008, which predate this check and are not
    # retroactively edited — editing an already-applied migration is unsafe).
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Flag unsafe DDL patterns in new/changed migrations
        run: |
          set -euo pipefail
          # No --depth=1 here: the checkout step already set fetch-depth: 0,
          # making the repo non-shallow. Shallow-fetching just the base ref
          # on top of that grafts it as a parentless commit, which breaks
          # the three-dot diff's merge-base lookup below with "no merge
          # base" (exit 128) whenever the base has advanced since the PR
          # branched — the common case for any real PR. That failure must
          # also be allowed to fail the job (not swallowed with `|| true`):
          # this is a safety guardrail, so a broken diff should fail loudly
          # rather than silently report "no migrations changed".
          git fetch origin "${{ github.base_ref }}"
          changed=$(git diff --name-only --diff-filter=AM "origin/${{ github.base_ref }}...HEAD" -- 'internal/db/migrations/*.sql')
          if [ -z "$changed" ]; then
            echo "No migration files changed."
            exit 0
          fi
          echo "Checking changed migrations:"
          echo "$changed"
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # Split the file into ;-terminated statements and flatten each
            # statement's internal newlines to spaces, so a multi-line
            # ALTER TABLE / CREATE INDEX (this repo uses both styles — see
            # e.g. 00002/00005 for multi-line, 00007 for single-line) is
            # matched the same way regardless of line breaks. Checking stays
            # scoped per statement, not file-wide, so a safe NOT VALID on one
            # statement can't mask an unsafe one elsewhere in the file.
            while IFS= read -r stmt; do
              [ -z "${stmt// /}" ] && continue
              # ALTER COLUMN ... TYPE rewrites the whole table under an
              # ACCESS EXCLUSIVE lock, blocking all reads/writes for the
              # duration on large tables — use an expand/contract migration
              # instead (add a new column, batch-backfill, then a fast
              # rename/drop), as internal/jobs/retention.go's batching
              # helper already does for large-table deletes.
              if echo "$stmt" | grep -qiE 'ALTER +COLUMN +[^ ]+ +TYPE'; then
                echo "::error file=$f::ALTER COLUMN ... TYPE rewrites the whole table under an ACCESS EXCLUSIVE lock. Use an expand/contract migration instead (add a new column, batch-backfill, then rename/drop)."
                fail=1
              fi
              # ADD CONSTRAINT ... CHECK without NOT VALID validates against
              # every existing row while holding an ACCESS EXCLUSIVE lock.
              if echo "$stmt" | grep -iE 'ADD +CONSTRAINT +[^ ]+ +CHECK' | grep -qiv 'NOT VALID'; then
                echo "::error file=$f::ADD CONSTRAINT ... CHECK without NOT VALID locks the table while validating every existing row. Add NOT VALID, then VALIDATE CONSTRAINT in a follow-up statement."
                fail=1
              fi
              # CREATE INDEX without CONCURRENTLY holds a table-level lock
              # blocking writes for the duration of the index build — the
              # single most common unsafe-DDL mistake in Postgres migrations,
              # and one this codebase has hit before (00009_notification_idempotency.sql,
              # already applied and not retroactively edited).
              if echo "$stmt" | grep -iE 'CREATE +(UNIQUE +)?INDEX' | grep -qivE 'CREATE +(UNIQUE +)?INDEX +CONCURRENTLY'; then
                echo "::error file=$f::CREATE INDEX without CONCURRENTLY holds a table-level lock blocking writes for the duration of the index build. Add CONCURRENTLY (and a '+goose NO TRANSACTION' annotation, since CONCURRENTLY cannot run inside a transaction)."
                fail=1
              fi
            done <<< "$(awk 'BEGIN{RS=";"} {gsub(/\n/," "); print}' "$f")"
          done <<< "$changed"
          exit $fail

  security-container:
    name: Security · Container scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build backend image
        run: docker build -t team-manager-backend:ci backend/
      - name: Scan image for vulnerabilities
        # Pinned to an immutable release tag rather than @master. trivy-action
        # was hit by a tag-hijacking supply-chain attack; a mutable branch ref
        # like @master is exactly the exposure that enables. v0.36.0 is covered
        # by GitHub's immutable-releases protection (commit ed142fd). Further
        # hardening: pin to the full commit SHA.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: team-manager-backend:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  security-container-frontend:
    name: Security · Container scan (Trivy, frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build frontend image
        run: docker build -t team-manager-frontend:ci frontend/
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: team-manager-frontend:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # `docker build` only proves the image compiles; it never runs
      # docker-entrypoint-runtime-config.sh (frontend/docker/), which
      # executes as the image's non-root user (uid 101) at container start
      # to regenerate config.js/index.html from API_BASE_URL — a permissions
      # or scripting bug there would only surface here, not in the build or
      # the Trivy scan above.
      - name: Boot the image and verify the runtime-config entrypoint
        run: |
          set -euo pipefail
          cid=$(docker run -d -p 18080:8080 -e API_BASE_URL=https://api.example.com team-manager-frontend:ci)
          trap 'docker logs "$cid"; docker rm -f "$cid" >/dev/null' EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:18080/healthz && break
            sleep 1
            if [ "$i" = 30 ]; then
              echo "::error::container never became healthy"
              exit 1
            fi
          done
          config_js=$(curl -sf http://localhost:18080/config.js)
          echo "$config_js"
          echo "$config_js" | grep -q 'https://api.example.com'
          curl -sf http://localhost:18080/ | grep -q 'https://api.example.com'

  dast:
    name: DAST — OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-build]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build backend
        working-directory: backend
        run: go build -o server ./cmd/server

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/testdb?sslmode=disable
          COOKIE_SECURE: "false"
          PORT: "8080"
        run: |
          ./server &
          echo $! > /tmp/server.pid
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && break
            sleep 1
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-report-zap

      - name: Upload ZAP Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/server.pid) || true

  helm-lint:
    name: Helm · Lint & template
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Helm
        # Pinned to the v3.16.3 tag ref (not the mutable `main` branch) so
        # the installer *script* is as pinned as the Helm *binary* it
        # installs (--version v3.16.3 already pins that) — every other
        # third-party dependency in this workflow is SHA/digest-pinned
        # (see the trivy-action pin's comment for why), this was the one
        # curl-|-bash exception fetching from a live, writable ref.
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/v3.16.3/scripts/get-helm-3 | bash -s -- --no-sudo --version v3.16.3

      # Lint and render against every values file this chart ships (base
      # values.yaml, plus each environment overlay) — a values-dependent
      # template error (e.g. a required field only set in one overlay) would
      # otherwise only surface at actual deploy time.
      - name: helm lint
        run: |
          set -e
          helm lint helm/team-manager
          helm lint helm/team-manager -f helm/team-manager/values-staging.yaml
          helm lint helm/team-manager -f helm/team-manager/values-prod.yaml

      - name: helm template
        run: |
          set -e
          helm template team-manager helm/team-manager > /dev/null
          helm template team-manager helm/team-manager -f helm/team-manager/values-staging.yaml > /dev/null
          helm template team-manager helm/team-manager -f helm/team-manager/values-prod.yaml > /dev/null
